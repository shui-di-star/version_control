spring.application.name=version_control_system

# ===== Datasource (MySQL 8) =====
# 敏感值支持环境变量覆盖，未设置时用本地开发默认值（root/root, vcs_dev）
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/vcs_dev?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===== MyBatis-Plus =====
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

# ===== File upload (single file <= 100MB) =====
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ===== JWT =====
# 生产环境务必用环境变量覆盖 JWT_SECRET
app.jwt.secret=${JWT_SECRET:change-me-in-production-a-very-long-secret-key-at-least-32-bytes}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===== MinIO (阶段八启用；此处为占位配置) =====
app.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
app.minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
app.minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
app.minio.bucket=${MINIO_BUCKET:vcs-assets}

# ===== Logging =====
logging.file.name=app.log
