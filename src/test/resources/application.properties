spring.application.name=version_control_system

# ===== 测试数据源：专用测试库 vcs_test（决策 7），与开发库 vcs_dev 隔离 =====
spring.datasource.url=${TEST_DB_URL:jdbc:mysql://localhost:3306/vcs_test?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== Flyway：测试前对 vcs_test 先 clean 再 migrate，保证 schema 干净可重建 =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=false
spring.flyway.clean-on-validation-error=true

# ===== MyBatis-Plus =====
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

# ===== JWT（测试占位） =====
app.jwt.secret=${JWT_SECRET:test-only-secret-key-at-least-32-bytes-long-xxxxx}
app.jwt.expiration-ms=86400000

# ===== MinIO（测试占位；无本地 MinIO 时相关测试用 Assumptions 跳过） =====
app.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
app.minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
app.minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
app.minio.bucket=${MINIO_BUCKET:vcs-assets-test}
