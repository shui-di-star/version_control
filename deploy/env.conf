# ============================================================
# VCS 部署环境变量（start.sh 会 source 本文件）
# 复制为 /opt/vcs/env.conf 后填入实际值
# ============================================================

# ----- MySQL -----
export DB_URL="jdbc:mysql://localhost:3306/vcs_prod?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true"
export DB_USERNAME="root"
export DB_PASSWORD="CHANGE_ME"

# ----- JWT -----
# 至少 32 字节的随机字符串，可用 openssl rand -base64 48 生成
export JWT_SECRET="CHANGE_ME"
export JWT_EXPIRATION_MS="86400000"    # 24h

# ----- MinIO -----
export MINIO_ENDPOINT="http://localhost:9000"
export MINIO_ACCESS_KEY="minioadmin"
export MINIO_SECRET_KEY="CHANGE_ME"
export MINIO_BUCKET="vcs-assets"

# ----- JVM 参数（可选调整）-----
export JVM_OPTS="-Xms256m -Xmx512m"
